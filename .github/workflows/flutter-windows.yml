name: Build Flutter Windows

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build SimpleDaily for Windows
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      # Habilitar soporte Windows a nivel global del runner
      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop

      # Descargar dependencias del proyecto
      - name: Get Flutter Packages
        run: flutter pub get

      # flutter create --platforms=windows no sobreescribe código existente,
      # solo asegura que los archivos CMake del runner estén presentes.
      - name: Ensure Windows platform is registered
        run: flutter create --platforms=windows .

      - name: Build Windows Release
        env:
          CL: /D_SILENCE_EXPERIMENTAL_COROUTINE_DEPRECATION_WARNINGS
        run: flutter build windows --release

      - name: Upload Windows Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SimpleDaily-Windows-Release
          path: build/windows/x64/runner/Release/
          retention-days: 14
